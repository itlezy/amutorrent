name: Baseline

on:
  push:
  pull_request:

jobs:
  baseline:
    uses: eMulebb/eMule-tooling/.github/workflows/reusable-baseline.yml@main
    with:
      policy_path: manifests/privacy-guard/policy.v1.json
      repo_kind: generic
      node_version: '24'
      node_cache_dependency_path: |
        repo/package-lock.json
        repo/server/package-lock.json
      extra_commands: |
        npm ci
        npm ci --prefix server --omit=dev
        npm run build
        npm run test:emulebb
      tooling_ref: main
